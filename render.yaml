services:
  # ── Backend: Node.js Web Service ──────────────────────────────────────────
  - type: web
    name: teamgrid-crm-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: PANDADOC_API_KEY
        sync: false
      - key: REPORT_EMAIL_RECIPIENT
        sync: false
      - key: CLIENT_URL
        value: https://crm-sys-1.onrender.com
      - key: SERVER_URL
        value: https://crm-sys.onrender.com
      - key: DEMO_SITE_URL
        value: https://crm-sys.onrender.com
      - key: ALLOW_TEST_DRIP
        value: "false"

  # ── Frontend: React Static Site ───────────────────────────────────────────
  - type: web
    name: teamgrid-crm-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://crm-sys.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
