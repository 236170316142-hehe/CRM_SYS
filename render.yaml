services:
  # ── Backend: Node.js Web Service ──────────────────────────────────────────
  - type: web
    name: teamgrid-crm-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: REDIS_URL
        sync: false          # Set manually (Upstash URL)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure value
      - key: CLIENT_URL
        fromService:
          name: teamgrid-crm-client
          type: web
          property: host     # Will be set to the static site's URL
      - key: RESEND_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: PANDADOC_API_KEY
        sync: false
      - key: REPORT_EMAIL_RECIPIENT
        sync: false

  # ── Frontend: React Static Site ───────────────────────────────────────────
  - type: web
    name: teamgrid-crm-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: teamgrid-crm-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
          # This makes VITE_API_URL = https://teamgrid-crm-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
